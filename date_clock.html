<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip Clock</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    font-family: 'Bebas Neue', 'Arial Black', sans-serif;
  }

  .clock-wrapper {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 16px;
    background: transparent;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* Cards: 40x54 (80% of 50x67) */
  .flip-card {
    position: relative;
    width: 40px;
    height: 54px;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }
  .flip-card .top-half,
  .flip-card .bottom-half {
    position: absolute;
    width: 100%;
    height: 50%;
    overflow: hidden;
    left: 0;
  }
  .flip-card .top-half {
    top: 0;
    background: linear-gradient(180deg, #3a3a3a, #2a2a2a);
    border-radius: 6px 6px 0 0;
    border-bottom: 1px solid #111;
  }
  .flip-card .bottom-half {
    bottom: 0;
    background: linear-gradient(180deg, #222, #1a1a1a);
    border-radius: 0 0 6px 6px;
  }
  .flip-card .top-half .digit,
  .flip-card .bottom-half .digit {
    position: absolute;
    width: 100%;
    text-align: center;
    font-size: 40px;
    font-weight: 400;
    line-height: 54px;
    color: #e8e8e8;
  }
  .flip-card .top-half .digit { top: 0; }
  .flip-card .bottom-half .digit { bottom: 0; }
  .flip-card .hinge-l,
  .flip-card .hinge-r {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 5px;
    height: 5px;
    background: #0e0e0e;
    border-radius: 50%;
    z-index: 20;
  }
  .flip-card .hinge-l { left: 0; }
  .flip-card .hinge-r { right: 0; }
  .flip-card .shine {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 48%;
    background: linear-gradient(180deg, rgba(255,255,255,0.07), transparent);
    pointer-events: none;
    z-index: 15;
    border-radius: 6px 6px 0 0;
  }
  .flip-card .flipper {
    position: absolute;
    width: 100%;
    height: 50%;
    top: 0; left: 0;
    transform-origin: bottom center;
    z-index: 10;
    overflow: hidden;
    border-radius: 6px 6px 0 0;
    backface-visibility: hidden;
    pointer-events: none;
    display: none;
  }
  .flip-card .flipper.active {
    display: block;
    animation: flipDown 0.5s ease-in-out forwards;
  }
  .flip-card .flipper .digit {
    position: absolute;
    width: 100%;
    text-align: center;
    font-size: 40px;
    font-weight: 400;
    line-height: 54px;
    color: #e8e8e8;
    top: 0;
  }
  @keyframes flipDown {
    0% { transform: rotateX(0deg); background: linear-gradient(180deg, #3a3a3a, #2a2a2a); }
    100% { transform: rotateX(-90deg); background: linear-gradient(180deg, #222, #1a1a1a); }
  }

  .separator {
    font-size: 30px;
    color: #1a1a1a;
    line-height: 54px;
    padding: 0 1px;
    animation: blink 1s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .dot-sep {
    font-size: 19px;
    color: #1a1a1a;
    padding: 0 1px;
    align-self: center;
  }

  .label-day {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 34px;
    background: linear-gradient(180deg, #3a3a3a, #1a1a1a);
    border-radius: 6px;
    font-size: 13px;
    letter-spacing: 2px;
    color: #ccc;
    align-self: flex-end;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }

  .label-ampm {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 29px;
    height: 34px;
    background: linear-gradient(180deg, #3a3a3a, #1a1a1a);
    border-radius: 6px;
    font-size: 11px;
    letter-spacing: 2px;
    color: #ccc;
    align-self: flex-end;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }

  .section-gap { width: 11px; }

  .date-group, .time-group {
    display: flex;
    align-items: flex-end;
    gap: 3px;
  }
</style>
</head>
<body>

<div class="clock-wrapper">
  <div class="date-group">
    <div class="flip-card" id="y1"></div>
    <div class="flip-card" id="y2"></div>
    <div class="flip-card" id="y3"></div>
    <div class="flip-card" id="y4"></div>
    <span class="dot-sep">.</span>
    <div class="flip-card" id="m1"></div>
    <div class="flip-card" id="m2"></div>
    <span class="dot-sep">.</span>
    <div class="flip-card" id="d1"></div>
    <div class="flip-card" id="d2"></div>
    <div class="label-day" id="dayLabel">TUE</div>
  </div>
  <div class="section-gap"></div>
  <div class="time-group">
    <div class="flip-card" id="h1"></div>
    <div class="flip-card" id="h2"></div>
    <span class="separator">:</span>
    <div class="flip-card" id="mi1"></div>
    <div class="flip-card" id="mi2"></div>
    <span class="separator">:</span>
    <div class="flip-card" id="s1"></div>
    <div class="flip-card" id="s2"></div>
    <div class="label-ampm" id="ampm">PM</div>
  </div>
</div>

<script>
const DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const cardIds = ['y1','y2','y3','y4','m1','m2','d1','d2','h1','h2','mi1','mi2','s1','s2'];
const prevVals = {};

function initCards() {
  cardIds.forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML =
      '<div class="top-half"><div class="digit"></div></div>' +
      '<div class="bottom-half"><div class="digit"></div></div>' +
      '<div class="hinge-l"></div><div class="hinge-r"></div>' +
      '<div class="shine"></div>' +
      '<div class="flipper"><div class="digit"></div></div>';
  });
}

function setCard(id, val) {
  const el = document.getElementById(id);
  if (!el) return;
  const changed = prevVals[id] !== undefined && prevVals[id] !== val;
  if (changed) {
    const flipper = el.querySelector('.flipper');
    flipper.classList.remove('active');
    flipper.querySelector('.digit').textContent = prevVals[id];
    void flipper.offsetWidth;
    flipper.classList.add('active');
    setTimeout(() => flipper.classList.remove('active'), 500);
  }
  prevVals[id] = val;
  el.querySelector('.top-half .digit').textContent = val;
  el.querySelector('.bottom-half .digit').textContent = val;
}

function tick() {
  const now = new Date();
  const yr = String(now.getFullYear());
  const mo = String(now.getMonth() + 1).padStart(2, '0');
  const dy = String(now.getDate()).padStart(2, '0');
  let hr = now.getHours();
  const ampm = hr >= 12 ? 'PM' : 'AM';
  hr = hr % 12 || 12;
  const hrS = String(hr).padStart(2, '0');
  const mi = String(now.getMinutes()).padStart(2, '0');
  const sc = String(now.getSeconds()).padStart(2, '0');

  setCard('y1', yr[0]); setCard('y2', yr[1]);
  setCard('y3', yr[2]); setCard('y4', yr[3]);
  setCard('m1', mo[0]); setCard('m2', mo[1]);
  setCard('d1', dy[0]); setCard('d2', dy[1]);
  setCard('h1', hrS[0]); setCard('h2', hrS[1]);
  setCard('mi1', mi[0]); setCard('mi2', mi[1]);
  setCard('s1', sc[0]); setCard('s2', sc[1]);

  document.getElementById('dayLabel').textContent = DAYS[now.getDay()];
  document.getElementById('ampm').textContent = ampm;
}

initCards();
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
